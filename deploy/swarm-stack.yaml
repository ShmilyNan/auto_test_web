version: "3.9"

services:
  web:
    image: ${IMAGE_NAME:-autotest-web:latest}
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOSTNAME=0.0.0.0
      - API_PROXY_ORIGIN=${API_PROXY_ORIGIN:-http://api.autotest:5000}
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
    ports:
      - target: 8080
        published: ${PUBLISHED_PORT:-8080}
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: start-first
    networks:
      - autotest-network

networks:
  autotest-network:
    external: true
